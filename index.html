<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Owning An Empire</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React, ReactDOM, and Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Inline SVG Icons (Replaces lucide-react) ---
        const Play = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
        const CheckCircle2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>);
        const ArrowRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>);
        const Mail = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"></rect><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path></svg>);
        const BookOpen = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>);
        const Zap = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>);
        const Lock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>);

        // --- Main App Component ---
        function App() {
            const [email, setEmail] = useState('');

            const handleApply = () => {
                alert("This would open your calendar/booking widget!");
            };

            const handleSubscribe = (e) => {
                e.preventDefault();
                if (email) {
                    alert(`Subscribed ${email} to the playbook!`);
                    setEmail('');
                }
            };

            const handlePurchase = (item) => {
                alert(`This would redirect to checkout for: ${item}`);
            };

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-neutral-50 font-sans selection:bg-blue-500/30">
                    <div className="max-w-md mx-auto min-h-screen flex flex-col relative pb-20">
                        
                        <div className="absolute top-0 inset-x-0 h-64 bg-gradient-to-b from-blue-900/20 to-transparent -z-10 pointer-events-none"></div>

                        <main className="flex-1 flex flex-col gap-12 px-5 pt-12">
                            
                            <section className="flex flex-col gap-5 text-center">
                                <h1 className="text-4xl sm:text-5xl font-black tracking-tighter leading-[1.1]">
                                    Stop Renting Attention. <br />
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">
                                        Start Owning An Empire.
                                    </span>
                                </h1>
                                <p className="text-neutral-400 text-[15px] sm:text-base leading-relaxed font-medium px-2">
                                    You have the expertise. But without a structured IP ecosystem, you are leaving massive revenue on the table. I turn your raw authority into a highly profitable, automated digital empire.
                                </p>
                            </section>

                            <section className="flex flex-col gap-6">
                                <div className="flex flex-col gap-3">
                                    <div className="inline-flex items-center gap-2 bg-blue-500/10 text-blue-400 text-xs font-bold uppercase tracking-wider px-3 py-1.5 rounded-full w-max mx-auto">
                                        <span className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                                        Watch this 4-minute breakdown
                                    </div>
                                    <p className="text-sm text-center text-neutral-300 font-medium">
                                        How we use AI and the "Fractal Method" to build an interconnected lattice of digital assets that sell while you sleep.
                                    </p>
                                </div>

                                <div className="relative aspect-video bg-neutral-900 rounded-2xl border border-neutral-800 shadow-2xl shadow-blue-900/10 overflow-hidden group cursor-pointer">
                                    <div className="absolute inset-0 bg-gradient-to-br from-neutral-800 to-neutral-950 opacity-50 group-hover:opacity-40 transition-opacity"></div>
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <div className="w-16 h-16 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(37,99,235,0.5)] group-hover:scale-110 transition-transform duration-300">
                                            <Play className="w-6 h-6 ml-1 fill-current" />
                                        </div>
                                    </div>
                                    <div className="absolute bottom-3 left-4 right-4 flex justify-between items-center text-xs font-semibold text-neutral-400">
                                        <span>The Empire Paradigm</span>
                                        <span>04:12</span>
                                    </div>
                                </div>

                                <div className="bg-neutral-900/50 rounded-2xl p-5 border border-neutral-800/50 flex flex-col gap-4">
                                    <h3 className="font-bold text-sm uppercase tracking-wider text-neutral-500 mb-1">Who this is for:</h3>
                                    
                                    <div className="flex items-start gap-3">
                                        <CheckCircle2 className="w-5 h-5 text-blue-500 shrink-0 mt-0.5" />
                                        <div>
                                            <span className="font-bold text-white text-sm">The Novice:</span>
                                            <p className="text-neutral-400 text-sm mt-0.5">You have real-world expertise and need to build a bulletproof brand foundation.</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex items-start gap-3">
                                        <CheckCircle2 className="w-5 h-5 text-blue-500 shrink-0 mt-0.5" />
                                        <div>
                                            <span className="font-bold text-white text-sm">The Unrefined Brand:</span>
                                            <p className="text-neutral-400 text-sm mt-0.5">You have an audience, but no scalable Intellectual Property (IP) or unique frameworks.</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex items-start gap-3">
                                        <CheckCircle2 className="w-5 h-5 text-blue-500 shrink-0 mt-0.5" />
                                        <div>
                                            <span className="font-bold text-white text-sm">The Under-Optimized Operator:</span>
                                            <p className="text-neutral-400 text-sm mt-0.5">You are burnt out on the content treadmill, missing revenue, and need a true ecosystem.</p>
                                        </div>
                                    </div>
                                </div>

                                <button 
                                    onClick={handleApply}
                                    className="w-full bg-blue-600 hover:bg-blue-500 text-white font-black text-sm uppercase tracking-wide py-4 px-6 rounded-xl shadow-[0_0_20px_rgba(37,99,235,0.3)] hover:shadow-[0_0_30px_rgba(37,99,235,0.5)] transition-all active:scale-[0.98] flex items-center justify-center gap-2"
                                >
                                    Apply To Build Your Empire
                                    <ArrowRight className="w-4 h-4" />
                                </button>
                                <p className="text-center text-xs text-neutral-500 font-medium -mt-3">(Book Your Strategy Call)</p>
                            </section>

                            <hr className="border-neutral-800/60" />

                            <section className="bg-gradient-to-b from-neutral-900 to-neutral-950 rounded-3xl p-6 border border-neutral-800 relative overflow-hidden">
                                <div className="absolute -top-12 -right-12 w-32 h-32 bg-indigo-500/20 rounded-full blur-3xl pointer-events-none"></div>
                                
                                <div className="flex flex-col gap-4 relative z-10">
                                    <div className="w-10 h-10 bg-indigo-500/20 rounded-lg flex items-center justify-center mb-1 text-indigo-400">
                                        <Lock className="w-5 h-5" />
                                    </div>
                                    <h2 className="text-xl font-black tracking-tight text-white leading-tight">
                                        Not ready for the 12-Week Program? <br/>
                                        <span className="text-indigo-400">Steal my blueprint.</span>
                                    </h2>
                                    <p className="text-sm text-neutral-400 leading-relaxed font-medium">
                                        Get <strong className="text-neutral-200">The IP Empire Playbook</strong>. Learn the exact 3-tool AI stack and "Problem-Solution" mapping strategy I use to turn a single idea into 15+ pieces of viral content and highly profitable digital assets.
                                    </p>

                                    <form onSubmit={handleSubscribe} className="mt-2 flex flex-col gap-3">
                                        <div className="relative">
                                            <Mail className="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-500" />
                                            <input 
                                                type="email" 
                                                placeholder="Enter your best email..."
                                                value={email}
                                                onChange={(e) => setEmail(e.target.value)}
                                                required
                                                className="w-full bg-black border border-neutral-800 focus:border-indigo-500 rounded-xl py-3 pl-10 pr-4 text-sm text-white placeholder:text-neutral-600 focus:outline-none transition-colors"
                                            />
                                        </div>
                                        <button 
                                            type="submit"
                                            className="w-full bg-white text-black hover:bg-neutral-200 font-bold text-sm uppercase tracking-wide py-3.5 rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-white/5"
                                        >
                                            Send Me The Free Playbook
                                        </button>
                                    </form>
                                </div>
                            </section>

                            <section className="flex flex-col gap-5 mb-12">
                                <div className="text-center mb-2">
                                    <h2 className="text-2xl font-black tracking-tight mb-2">The Asset Vault</h2>
                                    <p className="text-sm text-neutral-400 font-medium">Plug-and-play systems to scale your digital footprint today.</p>
                                </div>

                                <div className="group bg-neutral-900 border border-neutral-800 rounded-2xl p-5 hover:border-neutral-700 transition-colors flex flex-col gap-4">
                                    <div className="flex gap-4">
                                        <div className="w-12 h-12 bg-neutral-800 rounded-xl flex items-center justify-center shrink-0 text-blue-400 shadow-inner shadow-black/50">
                                            <BookOpen className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <div className="flex items-center justify-between gap-2 mb-1">
                                                <h3 className="font-bold text-base text-white">The Lean Launch Blueprint</h3>
                                                <span className="bg-emerald-500/10 text-emerald-400 text-xs font-black px-2 py-1 rounded-md tracking-wide">$47</span>
                                            </div>
                                            <p className="text-xs text-neutral-400 leading-relaxed font-medium">
                                                Stop building products in the dark. Learn how to pre-sell your knowledge and get paid before you build.
                                            </p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => handlePurchase('Lean Launch Blueprint')}
                                        className="w-full bg-neutral-800 hover:bg-neutral-700 text-white text-sm font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2"
                                    >
                                        Get It Now <ArrowRight className="w-4 h-4 text-neutral-400 group-hover:text-white transition-colors" />
                                    </button>
                                </div>

                                <div className="group bg-neutral-900 border border-neutral-800 rounded-2xl p-5 hover:border-neutral-700 transition-colors flex flex-col gap-4">
                                    <div className="flex gap-4">
                                        <div className="w-12 h-12 bg-neutral-800 rounded-xl flex items-center justify-center shrink-0 text-amber-400 shadow-inner shadow-black/50">
                                            <Zap className="w-6 h-6" />
                                        </div>
                                        <div>
                                            <div className="flex items-center justify-between gap-2 mb-1">
                                                <h3 className="font-bold text-base text-white">The Content Fractal Engine</h3>
                                                <span className="bg-emerald-500/10 text-emerald-400 text-xs font-black px-2 py-1 rounded-md tracking-wide">$27</span>
                                            </div>
                                            <p className="text-xs text-neutral-400 leading-relaxed font-medium">
                                                100+ proven viral hooks and the exact AI prompts to turn one concept into a month of content.
                                            </p>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => handlePurchase('Content Fractal Engine')}
                                        className="w-full bg-neutral-800 hover:bg-neutral-700 text-white text-sm font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2"
                                    >
                                        Get It Now <ArrowRight className="w-4 h-4 text-neutral-400 group-hover:text-white transition-colors" />
                                    </button>
                                </div>
                                
                            </section>

                        </main>
                        
                        <footer className="text-center pb-8 pt-4 border-t border-neutral-800/50 mt-auto">
                            <p className="text-[10px] uppercase tracking-widest text-neutral-600 font-bold">
                                &copy; {new Date().getFullYear()} Your Brand Empire
                            </p>
                        </footer>
                    </div>
                </div>
            );
        }

        // --- Render the App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
